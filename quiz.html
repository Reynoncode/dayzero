<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maliyyə Menecmenti Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    position: fixed; top: 0; left: -280px; width: 280px; height: 100vh;
    background: #fff; border-right: 1px solid #e0ddd6; z-index: 100;
    transition: left 0.3s ease; overflow-y: auto; display: flex; flex-direction: column;
  }
  .sidebar.open { left: 0; }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #e0ddd6; position: sticky; top: 0;
    background: #fff; display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-header h2 { font-size: 14px; font-weight: 600; color: #444; }
  .sidebar-close { background: none; border: none; cursor: pointer; font-size: 20px; color: #888; padding: 4px 8px; }
  .sidebar-close:hover { color: #333; }
  .sidebar-list { padding: 8px 0; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    cursor: pointer; font-size: 13px; color: #444; transition: background 0.15s; border: none;
    background: none; width: 100%; text-align: left;
  }
  .sidebar-item:hover { background: #f5f4f0; }
  .sidebar-item.active { background: #eeedfb; color: #534ab7; font-weight: 500; }
  .sidebar-item.answered-correct { color: #1d6a3f; }
  .sidebar-item.answered-wrong { color: #a32d2d; }
  .q-num {
    width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: #e8e7e3; color: #666;
  }
  .sidebar-item.answered-correct .q-num { background: #c0dd97; color: #27500a; }
  .sidebar-item.answered-wrong .q-num { background: #f7c1c1; color: #791f1f; }
  .sidebar-item.active .q-num { background: #afa9ec; color: #26215c; }

  /* Overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; display: none; }
  .overlay.show { display: block; }

  /* Main */
  .main { min-height: 100vh; padding: 0; display: flex; flex-direction: column; }

  /* Topbar */
  .topbar {
    position: sticky; top: 0; background: #fff; border-bottom: 1px solid #e0ddd6;
    padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 50;
  }
  .burger { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px; }
  .burger:hover { background: #f0efe9; }
  .burger span { display: block; width: 20px; height: 2px; background: #555; margin: 4px 0; border-radius: 2px; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #333; flex: 1; }
  .progress-pill {
    font-size: 12px; background: #eeedfb; color: #534ab7; padding: 4px 10px;
    border-radius: 20px; font-weight: 500; white-space: nowrap;
  }
  .score-pill {
    font-size: 12px; background: #eaf3de; color: #3b6d11; padding: 4px 10px;
    border-radius: 20px; font-weight: 500; white-space: nowrap;
  }

  /* Progress bar */
  .progress-bar { height: 3px; background: #e8e7e3; }
  .progress-fill { height: 3px; background: #534ab7; transition: width 0.4s ease; }

  /* Question card */
  .question-area { flex: 1; padding: 24px 20px 100px; max-width: 720px; margin: 0 auto; width: 100%; }

  .topic-badge {
    display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
    background: #eeedfb; color: #534ab7; text-transform: uppercase;
  }
  .question-num { font-size: 12px; color: #888; margin-bottom: 6px; }
  .question-text {
    font-size: 17px; line-height: 1.6; color: #1a1a1a; margin-bottom: 20px; font-weight: 500;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    background: #fff; border: 1.5px solid #e0ddd6; border-radius: 10px;
    cursor: pointer; font-size: 15px; text-align: left; transition: all 0.15s; color: #1a1a1a;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: #afa9ec; background: #f7f6fe; }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0; color: #666; transition: all 0.15s;
  }
  .option-text { padding-top: 4px; line-height: 1.5; }

  .option-btn.selected-correct { border-color: #1d9e75; background: #e1f5ee; }
  .option-btn.selected-correct .option-letter { background: #1d9e75; border-color: #1d9e75; color: #fff; }
  .option-btn.selected-wrong { border-color: #e24b4a; background: #fcebeb; }
  .option-btn.selected-wrong .option-letter { background: #e24b4a; border-color: #e24b4a; color: #fff; }
  .option-btn.correct-answer { border-color: #1d9e75; background: #e1f5ee; }
  .option-btn.correct-answer .option-letter { background: #1d9e75; border-color: #1d9e75; color: #fff; }
  .option-btn.dimmed { opacity: 0.45; }

  /* Explanation */
  .explanation {
    margin-top: 16px; padding: 16px; background: #fff; border: 1px solid #e0ddd6;
    border-radius: 10px; border-left: 4px solid #534ab7; display: none;
  }
  .explanation.show { display: block; }
  .explanation-title { font-size: 12px; font-weight: 700; color: #534ab7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .explanation-text { font-size: 14px; line-height: 1.7; color: #333; }
  .explanation-text strong { font-weight: 600; }

  .result-banner {
    display: none; align-items: center; gap: 8px; padding: 12px 14px;
    border-radius: 10px; margin-top: 12px; font-size: 14px; font-weight: 500;
  }
  .result-banner.show { display: flex; }
  .result-banner.correct { background: #e1f5ee; color: #0f6e56; }
  .result-banner.wrong { background: #fcebeb; color: #a32d2d; }
  .result-icon { font-size: 20px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
    border-top: 1px solid #e0ddd6; padding: 12px 20px; display: flex;
    justify-content: space-between; align-items: center; gap: 10px; z-index: 50;
  }
  .nav-hint { font-size: 12px; color: #aaa; }
  .btn-next {
    padding: 10px 24px; background: #534ab7; color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; display: none;
  }
  .btn-next:hover { background: #3c3489; }
  .btn-next.show { display: block; }
  .btn-prev {
    padding: 10px 18px; background: #fff; color: #555; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .btn-prev:hover { border-color: #aaa; }

  /* Results screen */
  .results-screen { display: none; padding: 40px 20px; max-width: 600px; margin: 0 auto; text-align: center; }
  .results-screen.show { display: block; }
  .results-circle {
    width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 24px;
    background: #eeedfb; border: 6px solid #534ab7; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .results-score { font-size: 36px; font-weight: 700; color: #534ab7; }
  .results-label { font-size: 12px; color: #888; }
  .results-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .results-sub { font-size: 15px; color: #666; margin-bottom: 28px; }
  .btn-restart {
    padding: 12px 32px; background: #534ab7; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-right: 10px;
  }
  .btn-restart:hover { background: #3c3489; }
  .btn-review {
    padding: 12px 24px; background: #fff; color: #534ab7; border: 2px solid #534ab7;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-review:hover { background: #f0effe; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 24px 0; }
  .stat-card { background: #f8f7f3; border-radius: 10px; padding: 16px 8px; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }
  .stat-card.c1 .stat-val { color: #1d9e75; }
  .stat-card.c2 .stat-val { color: #e24b4a; }
  .stat-card.c3 .stat-val { color: #534ab7; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Suallar</h2>
    <button class="sidebar-close" onclick="closeSidebar()">&#10005;</button>
  </div>
  <div class="sidebar-list" id="sidebarList"></div>
</nav>

<div class="main">
  <div class="topbar">
    <button class="burger" onclick="toggleSidebar()" aria-label="Menyu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title">Maliyyə Menecmenti</div>
    <span class="score-pill" id="scorePill">✓ 0</span>
    <span class="progress-pill" id="progressPill">0 / 60</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="question-area" id="questionArea">
    <div class="topic-badge" id="topicBadge"></div>
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="result-banner" id="resultBanner">
      <span class="result-icon" id="resultIcon"></span>
      <span id="resultMsg"></span>
    </div>
    <div class="explanation" id="explanation">
      <div class="explanation-title">Həll / İzah</div>
      <div class="explanation-text" id="explanationText"></div>
    </div>
  </div>

  <div class="results-screen" id="resultsScreen">
    <div class="results-circle">
      <div class="results-score" id="rScore"></div>
      <div class="results-label">/ 60</div>
    </div>
    <div class="results-title" id="rTitle"></div>
    <div class="results-sub" id="rSub"></div>
    <div class="stats-grid">
      <div class="stat-card c1"><div class="stat-val" id="rCorrect"></div><div class="stat-lbl">Düzgün</div></div>
      <div class="stat-card c2"><div class="stat-val" id="rWrong"></div><div class="stat-lbl">Səhv</div></div>
      <div class="stat-card c3"><div class="stat-val" id="rPct"></div><div class="stat-lbl">Faiz</div></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">Yenidən Başla</button>
    <button class="btn-review" onclick="reviewQuiz()">Bax / Nəzərdən Keçir</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="btn-prev" onclick="prevQuestion()" id="btnPrev">&#8592; Əvvəlki</button>
  <span class="nav-hint" id="navHint">Cavab seçin</span>
  <button class="btn-next show" id="btnNext" onclick="nextQuestion()" style="display:none">Növbəti &#8594;</button>
</div>

<script>
const questions = [
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İstiqrazı emitent edən tərəfin (borcalanın) müqavilə öhdəliklərini (müntəzəm kupon ödənişləri və ya müddətin sonunda nominal dəyərin geri qaytarılması) yerinə yetirə bilməməsi maliyyə menecmentində necə adlanır?",
    opts: ["Likvidlik riski","Defolt (Ödəniş qabiliyyətsizliyi)","Faiz dərəcəsi riski","İnflyasiya riski","Sistem riski"],
    ans: 1,
    exp: "Emitentin kupon ödənişlərini və ya müddətin sonunda nominal dəyəri geri qaytara bilməməsi <strong>defolt riski</strong>dir. Bu, borcalanın öhdəliyini yerinə yetirə bilməmə vəziyyətidir."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Nominal dəyəri 1000 AZN, illik kupon dərəcəsi 8% olan və bazarda analoji riskə malik qiymətli kağızlar üzrə tələb olunan gəlirliliyi 10% təşkil edən 5 il müddətli bir istiqrazın cari bazar dəyəri təxminən nə qədər olar?",
    opts: ["1000.00 AZN","924.18 AZN","1080.00 AZN","850.60 AZN","1196.36 AZN"],
    ans: 1,
    exp: "Kupon = 1000 × 8% = <strong>80 AZN</strong>, diskont dərəcəsi = 10%, müddət = 5 il.<br>PV = 80/1.10¹ + 80/1.10² + 80/1.10³ + 80/1.10⁴ + 1080/1.10⁵<br>= 72.73 + 66.12 + 60.11 + 54.64 + 670.82 = <strong>924.18 AZN</strong><br>Tələb olunan gəlirlilik (10%) > kupon dərəcəsi (8%) olduğundan istiqraz diskontla satılır."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İllik kupon ödənişinin istiqrazın cari bazar qiymətinə olan nisbəti necə adlanır?",
    opts: ["Kupon faiz dərəcəsi","Müddətin sonunadək gəlirlilik (YTM)","Cari gəlirlilik","Real gəlirlilik dərəcəsi","Kapital artımı gəlirliliyi"],
    ans: 2,
    exp: "<strong>Cari gəlirlilik</strong> = İllik kupon / Cari bazar qiyməti.<br>Məsələn: 80 AZN kupon / 924.18 AZN qiymət = 8.66%.<br>YTM isə bütün pul axınlarını nəzərə alır, sadəcə kupon deyil."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İstiqrazın cari bazar qiyməti 924.18 AZN, illik kupon ödənişi 80 AZN və nominal dəyəri 1000 AZN-dir. Bu istiqrazın cari gəlirliliyi (current yield) nə qədərdir?",
    opts: ["8.00%","8.66%","10.00%","9.24%","11.12%"],
    ans: 1,
    exp: "Cari gəlirlilik = Kupon / Qiymət = 80 / 924.18 = <strong>0.0866 = 8.66%</strong><br>Diqqət: Bu YTM (10%) deyil — YTM nominal dəyərə qayıdışı da əhatə edir."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İstiqrazın bazar qiymətini onun gələcək bütün pul axınlarının cari (bugünkü) dəyərinə bərabər edən diskont dərəcəsi necə adlanır?",
    opts: ["Kupon dərəcəsi","Cari gəlirlilik","Nominal faiz dərəcəsi","Müddətin sonunadək gəlirlilik (MSG / YTM)","Effektiv vergi dərəcəsi"],
    ans: 3,
    exp: "<strong>YTM (Yield to Maturity / Müddətin sonunadək gəlirlilik)</strong> — istiqrazın bütün gələcək pul axınlarını (kuponlar + nominal) cari qiymətə bərabər edən daxili gəlirlilik dərəcəsidir. IRR-in istiqraz variantıdır."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İstiqrazın kupon faiz dərəcəsi bazarda oxşar riskli aktivlər üzrə tələb olunan gəlirlilik dərəcəsinə tam bərabər olduqda, istiqrazın bazar qiyməti barədə hansı hökm doğrudur?",
    opts: ["İstiqraz premiumla satılır","İstiqraz diskontla satılır","İstiqraz nominal dəyərinə bərabər qiymətə satılır","İstiqrazın dəyəri sıfıra enir","İstiqrazın qiyməti volatilliyini tam itirir"],
    ans: 2,
    exp: "Kupon dərəcəsi = Tələb olunan gəlirlilik → Qiymət = <strong>Nominal dəyər (1000 AZN)</strong> — buna \"par dəyər\" deyilir.<br>Kupon &gt; tələb → Premium (qiymət &gt; nominal)<br>Kupon &lt; tələb → Diskont (qiymət &lt; nominal)"
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Bazarda tələb olunan gəlirlilik dərəcəsi 12% olduğu halda, 20 illik, 10% illik kupon ödənişli və 1000 AZN nominal dəyərli istiqrazın bazar qiyməti 850.60 AZN təşkil edir. Bu növ istiqraz qiymətli kağızlar bazarında necə təsnif edilir?",
    opts: ["Premium istiqraz","Diskont istiqraz","Perpetiutet istiqraz","Sıfır kuponlu istiqraz","Risksiz istiqraz"],
    ans: 1,
    exp: "Tələb olunan gəlirlilik (12%) &gt; Kupon dərəcəsi (10%) → Qiymət &lt; Nominal → <strong>Diskont istiqraz</strong>.<br>850.60 AZN &lt; 1000 AZN — bazar qiyməti nominaldən aşağıdır."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Tələb olunan bazar gəlirliliyi 8%-ə düşdüğü halda, 20 illik, 10% illik kuponlu, 1000 AZN nominal dəyəri olan istiqrazın qiyməti 1,196.36 AZN-ə yüksəlir. Bu istiqraz maliyyə bazarlarında necə adlanır?",
    opts: ["Diskont istiqraz","Müddətli istiqraz","Premium istiqraz","Konvertasiya olunan istiqraz","Junk (Zibil) istiqraz"],
    ans: 2,
    exp: "Tələb olunan gəlirlilik (8%) &lt; Kupon dərəcəsi (10%) → Qiymət &gt; Nominal → <strong>Premium istiqraz</strong>.<br>1,196.36 AZN &gt; 1000 AZN — bazar qiyməti nominaldən yuxarıdır."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "İstiqrazın qiyməti ilə onun müddətin sonunadək gəlirliliyi (MSG) arasında hansı funksional əlaqə mövcuddur?",
    opts: ["Düz mütənasib əlaqə","Heç bir əlaqə yoxdur","Tərs mütənasib əlaqə","Eksponensial artan düz əlaqə","Sabit xətti əlaqə"],
    ans: 2,
    exp: "İstiqraz qiyməti ilə YTM arasında <strong>tərs mütənasib (əks) əlaqə</strong> var:<br>• YTM artırsa → qiymət düşür<br>• YTM düşürsə → qiymət artır<br>Bu, diskontlaşdırma mexanizminin nəticəsidir."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Müddətindən başqa bütün digər parametrləri tam eyni olan iki istiqrazı müqayisə etdikdə, bazarda faiz dərəcələrinin dəyişməsinə (faiz riskinə) qarşı hansı istiqraz daha yüksək həssaslıq nümayiş etdirir?",
    opts: ["Qısamüddətli istiqraz","Uzunmüddətli istiqraz","Hər ikisi eyni dərəcədə həssasdır","Kupon ödənişi olmayan qısamüddətli istiqraz","Müddəti 1 ildən az olan istiqraz"],
    ans: 1,
    exp: "<strong>Uzunmüddətli istiqraz</strong> faiz dərəcəsi riskine daha çox həssasdır.<br>Müddət uzun olduqca Duration (orta ödəniş müddəti) artır → faiz dəyişikliklərinə həssaslıq artır.<br>Məntiq: Pul axınları uzaq gələcəkdədirsə, diskont dərəcəsindəki kiçik dəyişiklik qiymətə böyük təsir edir."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Kupon dərəcəsindən başqa bütün texniki parametrləri eyni olan iki istiqrazdan hansı bazarda faiz dərəcələrinin dalğalanmasına qarşı daha çox həssasdır?",
    opts: ["Daha yüksək kupon dərəcəsi olan istiqraz","Daha aşağı kupon dərəcəsi olan istiqraz","Kupon dərəcəsi bazar gəlirliliyinə bərabər olan istiqraz","Premiumla satılan yüksək kuponlu istiqraz","Kupon dərəcəsi dinamik dəyişən istiqraz"],
    ans: 1,
    exp: "<strong>Aşağı kuponlu istiqraz</strong> daha həssasdır.<br>Aşağı kupon → pul axınlarının çox hissəsi son ödənişdədir → Duration artır → faiz riski artır.<br>Sıfır kuponlu istiqraz Duration baxımından ən həssas olanıdır."
  },
  {
    topic: "İstiqrazların Dəyərləndirilməsi",
    q: "Moody's və S&P reytinq agentliklərinin təsnifatına görə, investorlar üçün ən yüksək kredit keyfiyyətini ifadə edən reytinq dərəcəsi hansıdır?",
    opts: ["Baa / BBB","Aaa / AAA","B / B","Caa / CCC","Ca / CC"],
    ans: 1,
    exp: "Ən yüksək kredit reytinqi: Moody's-də <strong>Aaa</strong>, S&P-də <strong>AAA</strong>.<br>Bu reytinq əsas borc və faizlərin ödənilməsinin ən yüksək etibarlılığını ifadə edir. Dövlət istiqrazları bu kateqoriyaya daxil ola bilər."
  },

    opts: ["Kapital Bazarı Xətti (CML)","Qiymətli Kağızlar Bazarı Xətti (SML - Security Market Line)","Karakteristik xətt","Effektiv Sərhəd (Efficient Frontier)","Regressiya xətti"],
    ans: 1,
    exp: "<strong>SML (Security Market Line)</strong> — CAPM-in qrafik ifadəsi:<br>• X oxu: Beta (sistem riski)<br>• Y oxu: Tələb olunan gəlirlilik<br>• Başlanğıc nöqtəsi: (β=0, Rf)<br>• Meyil: Bazar risk premiyası (Rm − Rf)<br>CML isə standart kənarlaşma vs gəlirlilik əlaqəsini göstərir (fərqlidir)."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let correctCount = 0;
let reviewMode = false;

function init() {
  buildSidebar();
  loadQuestion(0);
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item' + (i === current ? ' active' : '') +
      (answers[i] !== null ? (answers[i] === q.ans ? ' answered-correct' : ' answered-wrong') : '');
    btn.innerHTML = `<div class="q-num">${i+1}</div><span>${truncate(q.q, 40)}</span>`;
    btn.onclick = () => { closeSidebar(); loadQuestion(i); };
    list.appendChild(btn);
  });
}

function truncate(str, n) { return str.length > n ? str.slice(0, n) + '…' : str; }

function loadQuestion(idx) {
  current = idx;
  const q = questions[idx];
  const answered = answers[idx] !== null;

  document.getElementById('topicBadge').textContent = q.topic;
  document.getElementById('questionNum').textContent = `Sual ${idx + 1} / ${questions.length}`;
  document.getElementById('questionText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A','B','C','D','E'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-letter">${letters[i]}</div><div class="option-text">${opt}</div>`;
    if (!answered && !reviewMode) {
      btn.onclick = () => selectAnswer(i);
    } else {
      btn.disabled = true;
      if (answered) {
        if (i === q.ans) btn.classList.add('correct-answer');
        else if (i === answers[idx]) btn.classList.add('selected-wrong');
        else btn.classList.add('dimmed');
      }
    }
    container.appendChild(btn);
  });

  const expEl = document.getElementById('explanation');
  const expText = document.getElementById('explanationText');
  const banner = document.getElementById('resultBanner');
  const hint = document.getElementById('navHint');

  if (answered || reviewMode) {
    expEl.classList.add('show');
    expText.innerHTML = q.exp;
    banner.classList.remove('show');
    hint.textContent = '';
    if (answered) {
      const correct = answers[idx] === q.ans;
      banner.classList.add('show');
      banner.className = 'result-banner show ' + (correct ? 'correct' : 'wrong');
      document.getElementById('resultIcon').textContent = correct ? '✓' : '✗';
      document.getElementById('resultMsg').textContent = correct ? 'Düzgün cavab!' : `Səhv! Düzgün cavab: ${letters[q.ans]}) ${q.opts[q.ans]}`;
    }
  } else {
    expEl.classList.remove('show');
    banner.classList.remove('show');
    hint.textContent = 'Cavab seçin';
  }

  const btnNext = document.getElementById('btnNext');
  if (answered || reviewMode) {
    btnNext.style.display = 'block';
    btnNext.textContent = idx < questions.length - 1 ? 'Növbəti →' : 'Nəticə';
  } else {
    btnNext.style.display = 'none';
  }

  document.getElementById('btnPrev').style.display = idx > 0 ? 'block' : 'none';
  updateProgress();
  buildSidebar();
  window.scrollTo(0, 0);
}

function selectAnswer(i) {
  const q = questions[current];
  answers[current] = i;
  if (i === q.ans) correctCount++;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === q.ans) btn.classList.add('correct-answer');
    else if (idx === i) btn.classList.add('selected-wrong');
    else btn.classList.add('dimmed');
  });

  const letters = ['A','B','C','D','E'];
  const banner = document.getElementById('resultBanner');
  const correct = i === q.ans;
  banner.classList.add('show');
  banner.className = 'result-banner show ' + (correct ? 'correct' : 'wrong');
  document.getElementById('resultIcon').textContent = correct ? '✓' : '✗';
  document.getElementById('resultMsg').textContent = correct ? 'Düzgün cavab!' : `Səhv! Düzgün cavab: ${letters[q.ans]}) ${q.opts[q.ans]}`;

  document.getElementById('explanation').classList.add('show');
  document.getElementById('explanationText').innerHTML = q.exp;

  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'block';
  btnNext.textContent = current < questions.length - 1 ? 'Növbəti →' : 'Nəticə';
  document.getElementById('navHint').textContent = '';

  updateProgress();
  buildSidebar();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    loadQuestion(current + 1);
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (current > 0) loadQuestion(current - 1);
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPill').textContent = `${answered} / ${questions.length}`;
  document.getElementById('scorePill').textContent = `✓ ${correctCount}`;
}

function showResults() {
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('resultsScreen').classList.add('show');
  document.querySelector('.bottom-nav').style.display = 'none';

  const pct = Math.round((correctCount / questions.length) * 100);
  document.getElementById('rScore').textContent = correctCount;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rWrong').textContent = questions.length - correctCount;
  document.getElementById('rPct').textContent = pct + '%';

  let title, sub;
  if (pct >= 90) { title = 'Əla nəticə!'; sub = 'Maliyyə menecmentini çox yaxşı bilirsiniz!'; }
  else if (pct >= 70) { title = 'Yaxşı iş!'; sub = 'Daha çox təkrar edərək mükəmməlləşdirin.'; }
  else if (pct >= 50) { title = 'Orta səviyyə'; sub = 'Zəif olduğunuz mövzuları yenidən nəzərdən keçirin.'; }
  else { title = 'Daha çox çalışmaq lazımdır'; sub = 'Bütün mövzuları yenidən öyrənin.'; }

  document.getElementById('rTitle').textContent = title;
  document.getElementById('rSub').textContent = sub;
}

function restartQuiz() {
  answers = new Array(questions.length).fill(null);
  correctCount = 0;
  reviewMode = false;
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('questionArea').style.display = '';
  document.querySelector('.bottom-nav').style.display = '';
  loadQuestion(0);
}

function reviewQuiz() {
  reviewMode = true;
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('questionArea').style.display = '';
  document.querySelector('.bottom-nav').style.display = '';
  loadQuestion(0);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

init();
</script>
</body>
</html>
