<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dead Streets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="game-container">

    <!-- SCREEN: Base -->
    <div id="screen-base" class="screen active">
      <div id="base-topbar">
        <div class="top-stat"><span class="icon">☀</span><span id="stat-season">Yaz</span></div>
        <div class="top-stat"><span class="icon">📅</span><span id="stat-day">Gün 1</span></div>
        <div class="top-stat"><span class="icon">🕐</span><span id="stat-time">08:00</span></div>
        <div class="top-stat alert" id="stat-temp"><span class="icon">🌡</span><span id="stat-temp-val">18°</span></div>
      </div>

      <div id="status-bar">
        <div class="status-item" id="s-health">
          <div class="status-label">Can</div>
          <div class="status-bar-wrap"><div class="status-fill health-fill" id="fill-health"></div></div>
          <div class="status-val" id="val-health">80</div>
        </div>
        <div class="status-item" id="s-hunger">
          <div class="status-label">Ac</div>
          <div class="status-bar-wrap"><div class="status-fill hunger-fill" id="fill-hunger"></div></div>
          <div class="status-val" id="val-hunger">60</div>
        </div>
        <div class="status-item" id="s-thirst">
          <div class="status-label">Su</div>
          <div class="status-bar-wrap"><div class="status-fill thirst-fill" id="fill-thirst"></div></div>
          <div class="status-val" id="val-thirst">70</div>
        </div>
        <div class="status-item" id="s-mood">
          <div class="status-label">Əhval</div>
          <div class="status-bar-wrap"><div class="status-fill mood-fill" id="fill-mood"></div></div>
          <div class="status-val" id="val-mood">50</div>
        </div>
      </div>

      <div id="message-log">
        <div class="msg-line" id="msg-main">Yeni bir gün başladı. Ehtiyatlı ol.</div>
      </div>

      <div id="base-canvas-wrap">
        <canvas id="base-canvas"></canvas>
        <div id="room-tooltip" class="hidden"></div>
      </div>

      <div id="base-nav">
        <button class="nav-btn active" data-screen="base"><span>🏠</span>Baza</button>
        <button class="nav-btn" data-screen="map"><span>🗺</span>Xəritə</button>
        <button class="nav-btn" data-screen="inventory"><span>🎒</span>Çanta</button>
        <button class="nav-btn" data-screen="craft"><span>⚙</span>Craft</button>
      </div>
    </div>

    <!-- SCREEN: Map -->
    <div id="screen-map" class="screen">
      <div id="map-header">
        <button id="map-back" class="back-btn">← Geri</button>
        <span id="map-title">Xəritə</span>
        <span id="map-time-left"></span>
      </div>
      <canvas id="map-canvas"></canvas>
      <div id="location-panel" class="hidden">
        <div id="loc-name"></div>
        <div id="loc-distance"></div>
        <div id="loc-desc"></div>
        <div id="loc-danger"></div>
        <button id="loc-go-btn">Gedin →</button>
      </div>
    </div>

    <!-- SCREEN: Inventory -->
    <div id="screen-inventory" class="screen">
      <div id="inv-header">
        <button class="back-btn inv-back">← Geri</button>
        <span>Əşyalar</span>
        <span id="inv-weight">0/15 kg</span>
      </div>
      <div id="inv-grid"></div>
    </div>

    <!-- SCREEN: Craft -->
    <div id="screen-craft" class="screen">
      <div id="craft-header">
        <button class="back-btn craft-back">← Geri</button>
        <span>Düzəlt</span>
      </div>
      <div id="craft-list"></div>
    </div>

    <!-- SCREEN: Loot Location -->
    <div id="screen-loot" class="screen">
      <div id="loot-header">
        <div id="loot-location-name"></div>
        <div id="loot-room-info"></div>
      </div>
      <canvas id="loot-canvas"></canvas>
      <div id="loot-action-panel">
        <div id="loot-message"></div>
        <div id="loot-actions"></div>
      </div>
    </div>

    <!-- SCREEN: Combat -->
    <div id="screen-combat" class="screen">
      <div id="combat-header">
        <div id="combat-wave-info">Otaq 1/7</div>
        <div id="combat-turn-info">Sənin növbən</div>
      </div>
      <div id="combat-arena">
        <div id="enemy-section">
          <div id="enemy-list"></div>
        </div>
        <div id="combat-log-box">
          <div id="combat-log"></div>
        </div>
        <div id="player-section">
          <div id="player-combat-stats"></div>
          <div id="combat-actions"></div>
        </div>
      </div>
    </div>

    <!-- MODAL: Build -->
    <div id="modal-build" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title" id="build-modal-title">İnşa Et</div>
        <div id="build-options"></div>
        <button class="modal-close" id="build-close">Bağla</button>
      </div>
    </div>

    <!-- MODAL: Room Action -->
    <div id="modal-room" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title" id="room-modal-title"></div>
        <div id="room-modal-body"></div>
        <button class="modal-close" id="room-close">Bağla</button>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/base.js"></script>
  <script src="js/map.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/loot.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
